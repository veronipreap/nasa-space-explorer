<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link rel="preconnect" href="https://api.nasa.gov" />
  <link rel="preconnect" href="https://apod.nasa.gov" />
  <link rel="preconnect" href="https://images-assets.nasa.gov" />
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <div class="media-filters" aria-label="Media type filters">
        <label for="imageOnly">
          <input type="checkbox" id="imageOnly" checked />
          Images
        </label>
        <label for="videoOnly">
          <input type="checkbox" id="videoOnly" checked />
          Videos
        </label>
      </div>
      <button>Get Space Media</button>
    </div>
    <p class="search-limit-note">Search limit: up to 30 days per request.</p>

    <section class="space-fact" aria-labelledby="spaceFactTitle">
      <p class="space-fact-kicker" id="spaceFactTitle">Did You Know?</p>
      <p id="spaceFactText" class="space-fact-text"></p>
    </section>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Media" to explore the cosmos!</p>
      </div>
    </div>

    <div id="imageModal" class="modal hidden" aria-hidden="true">
      <div class="modal-overlay" data-close-modal="true"></div>
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button id="closeModalBtn" class="modal-close" aria-label="Close modal">&times;</button>
        <p id="modalLoading" class="modal-loading hidden">Loading space media...</p>
        <img id="modalImage" src="" alt="" class="modal-image" />
        <iframe id="modalVideo" class="modal-video" title="NASA APOD video" allowfullscreen></iframe>
        <video id="modalNativeVideo" class="modal-video" controls playsinline preload="metadata"></video>
        <h2 id="modalTitle"></h2>
        <p id="modalDate" class="modal-date"></p>
        <p id="modalExplanation" class="modal-explanation"></p>
      </div>
    </div>

    <section class="chatbot" aria-label="Space helper chatbot">
      <button id="chatToggleBtn" class="chatbot-toggle" type="button" aria-expanded="true" aria-controls="chatPanel">
        Hide
      </button>

      <div id="chatPanel" class="chatbot-panel is-open" aria-hidden="false">
        <div class="chatbot-header">
          <h2>Space Helper</h2>
        </div>

        <div id="chatMessages" class="chatbot-messages" aria-live="polite">
          <p class="chatbot-message chatbot-bot-message">Hi! I only answer NASA-related questions. Try: "What is APOD?"</p>
        </div>

        <form id="chatForm" class="chatbot-form">
          <input id="chatInput" type="text" placeholder="Ask a space question..." maxlength="140" autocomplete="off" />
          <button type="submit">Send</button>
        </form>
      </div>
    </section>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
